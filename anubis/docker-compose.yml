# Anubis - AI bot firewall exposed as a Traefik ForwardAuth service.
# https://anubis.techaro.lol/
# https://anubis.techaro.lol/docs/admin/environments/traefik/

services:
  anubis:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-traefik}"
    image: "ghcr.io/techarohq/anubis:${IMAGE_TAG}"
    container_name: anubis
    hostname: anubis
    env_file: .env
    environment:
      # Bind address inside the container. :8923 is the Anubis default.
      BIND: ":8923"
      # Policy file path inside the container. Matches the bind mount below.
      POLICY_FNAME: "/config/policy.yml"
      # Trailing-space value is the documented Anubis convention for
      # redirect-mode operation. Do not change unless you know why.
      TARGET: " "
    volumes:
      - "${HOST_CONFIG_DIR:-./config}:/config:ro"
      - "${HOST_DATA_DIR:-./data}:/data"
      - /etc/localtime:/etc/localtime:ro
    ports:
      # Localhost-only bind. Traefik reaches Anubis on the shared external
      # `traefik` network; the localhost bind exists for direct verification
      # and debugging.
      - "${BIND_ADDR:-127.0.0.1}:${BIND_PORT:-8923}:8923/tcp"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

networks:
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"
