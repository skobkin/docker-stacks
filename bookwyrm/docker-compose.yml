# https://hub.docker.com/r/bookwyrm/bookwyrm
# https://github.com/bookwyrm-social/bookwyrm
#
# This stack uses COMPOSE_VARIANT to switch between:
#   default          - standalone, localhost-bound HTTP port
#   databases        - join the shared `databases` external network (central Postgres/Redis)
#   traefik          - join the shared `traefik` external network (default in this repo)
#   traefik_databases - combine Traefik and shared databases networking
#
# Bookwyrm uses two Redis instances (broker for Celery, activity for streaming)
# and a single Postgres database. The local db/redis services are gated by
# profiles: [local] so they are skipped in the databases / traefik_databases
# variants when the operator points POSTGRES_HOST / REDIS_*_HOST at central
# services on the shared `databases` network.

services:
  web:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    image: "bookwyrm/bookwyrm:${IMAGE_TAG:-latest}"
    container_name: bookwyrm-web
    env_file: .env
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST:-db}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      REDIS_ACTIVITY_HOST: "${REDIS_ACTIVITY_HOST:-redis_activity}"
      REDIS_ACTIVITY_PORT: "${REDIS_ACTIVITY_PORT:-6379}"
      REDIS_BROKER_HOST: "${REDIS_BROKER_HOST:-redis_broker}"
      REDIS_BROKER_PORT: "${REDIS_BROKER_PORT:-6379}"
    volumes:
      - "${STATIC_PATH:-./static}:/app/static"
      - "${MEDIA_PATH:-./media}:/app/images"
      - "${EXPORTS_PATH:-./exports}:/app/exports"
    command: gunicorn bookwyrm.wsgi:application
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${BIND_PORT:-8430}:8000"
    depends_on:
      db:
        condition: service_healthy
        required: false
      redis_broker:
        condition: service_healthy
        required: false
      redis_activity:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 1m
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

  static:
    extends:
      file: ./compose.static-features.yml
      service: "${COMPOSE_VARIANT:-default}"
    image: "nginx:alpine"
    container_name: bookwyrm-static
    volumes:
      - "${NGINX_STATIC_CONFIG:-./static/nginx-static.conf}:/etc/nginx/conf.d/default.conf:ro"
      - "${STATIC_PATH:-./static}:/app/static:ro"
      - "${MEDIA_PATH:-./media}:/app/images:ro"
    depends_on:
      - web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

  db:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    image: "postgres:17"
    container_name: bookwyrm-db
    profiles:
      - local
    env_file: .env
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-bookwyrm}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-bookwyrm}"
    shm_size: "${POSTGRES_SHM_SIZE:-128mb}"
    volumes:
      - "${PGDATA_PATH:-./pgdata}:/var/lib/postgresql/data"
      - "${BACKUPS_PATH:-./backups}:/backups"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookwyrm} -d ${POSTGRES_DB:-bookwyrm}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

  redis_broker:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    image: "redis:7.2-alpine"
    container_name: bookwyrm-redis-broker
    profiles:
      - local
    env_file: .env
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_BROKER_PASSWORD}"
      - "--appendonly"
      - "yes"
      - "--port"
      - "${REDIS_BROKER_PORT:-6379}"
    volumes:
      - "${REDIS_BROKER_PATH:-./redis_broker}:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_BROKER_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

  redis_activity:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    image: "redis:7.2-alpine"
    container_name: bookwyrm-redis-activity
    profiles:
      - local
    env_file: .env
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_ACTIVITY_PASSWORD}"
      - "--appendonly"
      - "yes"
      - "--port"
      - "${REDIS_ACTIVITY_PORT:-6379}"
    volumes:
      - "${REDIS_ACTIVITY_PATH:-./redis_activity}:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_ACTIVITY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

  celery_worker:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    image: "bookwyrm/bookwyrm:${IMAGE_TAG:-latest}"
    container_name: bookwyrm-celery-worker
    env_file: .env
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST:-db}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      REDIS_ACTIVITY_HOST: "${REDIS_ACTIVITY_HOST:-redis_activity}"
      REDIS_ACTIVITY_PORT: "${REDIS_ACTIVITY_PORT:-6379}"
      REDIS_BROKER_HOST: "${REDIS_BROKER_HOST:-redis_broker}"
      REDIS_BROKER_PORT: "${REDIS_BROKER_PORT:-6379}"
    volumes:
      - "${STATIC_PATH:-./static}:/app/static"
      - "${MEDIA_PATH:-./media}:/app/images"
      - "${EXPORTS_PATH:-./exports}:/app/exports"
    command: >-
      celery -A celerywyrm worker
      --pool=threads --concurrency=20 -l info
      -Q high_priority,medium_priority,low_priority,streams,images,suggested_users,email,connectors,lists,inbox,imports,import_triggered,broadcast,misc
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

  celery_beat:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    image: "bookwyrm/bookwyrm:${IMAGE_TAG:-latest}"
    container_name: bookwyrm-celery-beat
    env_file: .env
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST:-db}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      REDIS_ACTIVITY_HOST: "${REDIS_ACTIVITY_HOST:-redis_activity}"
      REDIS_ACTIVITY_PORT: "${REDIS_ACTIVITY_PORT:-6379}"
      REDIS_BROKER_HOST: "${REDIS_BROKER_HOST:-redis_broker}"
      REDIS_BROKER_PORT: "${REDIS_BROKER_PORT:-6379}"
    command: >-
      celery -A celerywyrm beat
      -l INFO
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

  flower:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    image: "bookwyrm/bookwyrm:${IMAGE_TAG:-latest}"
    container_name: bookwyrm-flower
    env_file: .env
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST:-db}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      REDIS_ACTIVITY_HOST: "${REDIS_ACTIVITY_HOST:-redis_activity}"
      REDIS_ACTIVITY_PORT: "${REDIS_ACTIVITY_PORT:-6379}"
      REDIS_BROKER_HOST: "${REDIS_BROKER_HOST:-redis_broker}"
      REDIS_BROKER_PORT: "${REDIS_BROKER_PORT:-6379}"
    command:
      - "celery"
      - "-A"
      - "celerywyrm"
      - "flower"
      - "--basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}"
      - "--url_prefix=flower"
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${FLOWER_BIND_PORT:-8440}:8888"
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

networks:
  bookwyrm:
    driver: bridge
  databases:
    external: true
    name: "${DATABASES_NETWORK:-databases}"
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"
