services:
  default: {}

  databases:
    networks:
      - bookwyrm
      - databases

  traefik:
    networks:
      - bookwyrm
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.bookwyrm-web.rule: "Host(`${TRAEFIK_HOST}`)"
      traefik.http.routers.bookwyrm-web.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.bookwyrm-web.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      traefik.http.routers.bookwyrm-web.priority: "0"
      traefik.http.routers.bookwyrm-web.service: "bookwyrm-web"
      traefik.http.services.bookwyrm-web.loadbalancer.server.port: "${TRAEFIK_SERVICE_PORT:-8000}"

  traefik_databases:
    networks:
      - bookwyrm
      - traefik
      - databases
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.bookwyrm-web.rule: "Host(`${TRAEFIK_HOST}`)"
      traefik.http.routers.bookwyrm-web.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.bookwyrm-web.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      traefik.http.routers.bookwyrm-web.priority: "0"
      traefik.http.routers.bookwyrm-web.service: "bookwyrm-web"
      traefik.http.services.bookwyrm-web.loadbalancer.server.port: "${TRAEFIK_SERVICE_PORT:-8000}"
