# nginx config for the bookwyrm-static sidecar.
# Mounted to /etc/nginx/conf.d/default.conf inside the container.
#
# This sidecar only serves /static/ and /images/. Traefik's path-based router
# (priority 1) directs those paths here; the catch-all (priority 0) routes
# everything else to gunicorn. The 404 fallback below is defensive only —
# traffic that reaches this container should already match a location.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Match the DATA_UPLOAD_MAX_MEMORY_MiB default in .env.dist.
    client_max_body_size 100m;

    # Long cache for fingerprinted assets under /static/.
    location /static/ {
        alias /app/static/;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri $uri/ =404;
    }

    # User-uploaded covers and avatars under /images/. Allow-list matches the
    # upstream nginx location in bookwyrm-social/bookwyrm.
    location /images/ {
        alias /app/images/;
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
        location ~* ^/images/.*\.(bmp|ico|jpg|jpeg|png|svg|tif|tiff|webp)$ {
            try_files $uri =404;
        }
        # Disallow anything that is not in the allow-list above.
        return 403;
    }

    # Defensive fallback — Traefik should not route anything else here.
    location / {
        return 404;
    }
}
