services:
  default: {}

  traefik:
    extends:
      file: 'hwaccel.transcoding.yml'
      service: '${HWACCEL_TRANSCODING:-cpu}'
    networks:
      - default
      - traefik
    labels:
      traefik.enable: 'true'
      traefik.docker.network: '${TRAEFIK_NETWORK:-traefik}'
      traefik.http.routers.immich.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.immich.entrypoints: '${TRAEFIK_ENTRYPOINT:-websecure}'
      traefik.http.routers.immich.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      traefik.http.routers.immich.service: immich
      traefik.http.services.immich.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-2283}'

networks:
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"
