services:
  default: {}

  traefik:
    networks:
      - default
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.mcp-basic-memory.rule: "Host(`${TRAEFIK_HOST}`)"
      traefik.http.routers.mcp-basic-memory.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.mcp-basic-memory.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      # Basic Memory's HTTP server is an MCP-over-SSE endpoint on /mcp. It does
      # not return a plain 200 on any path Traefik's load-balancer healthcheck
      # could probe (the MCP transport streams event/data, not a normal HTTP
      # response), so disable the default healthcheck and rely on the
      # container-level healthcheck defined in docker-compose.yml.
      traefik.http.services.mcp-basic-memory.loadbalancer.server.port: "8000"
      traefik.http.services.mcp-basic-memory.loadbalancer.healthcheck: "false"
