services:
  default: {}

  traefik:
    networks:
      - default
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.mcp-basic-memory.rule: "Host(`${TRAEFIK_HOST}`)"
      traefik.http.routers.mcp-basic-memory.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.mcp-basic-memory.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      traefik.http.services.mcp-basic-memory.loadbalancer.server.port: "8000"
      # Basic Memory is an MCP-over-SSE server. Traefik v3.3+ adds a default
      # load-balancer healthcheck that probes GET / every 5s and treats any
      # non-2xx response as unhealthy, hiding the router from the dashboard.
      # Basic Memory returns 404 on every non-SSE path (no /healthz, no /, no
      # /docs — only /mcp and /messages are served), so we point the probe at
      # / and tell Traefik to consider 404 a healthy response. Container
      # reachability is checked by the Docker healthcheck in docker-compose.yml.
      traefik.http.services.mcp-basic-memory.loadbalancer.healthcheck.path: "/"
      traefik.http.services.mcp-basic-memory.loadbalancer.healthcheck.status: "404"
