services:
  default: {}

  traefik:
    labels:
      traefik.enable: 'true'
      traefik.http.routers.qbittorrent.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.qbittorrent.entrypoints: '${TRAEFIK_ENTRYPOINT:-websecure}'
      traefik.http.routers.qbittorrent.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      traefik.http.services.qbittorrent.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-8090}'
