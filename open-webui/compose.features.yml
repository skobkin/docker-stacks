services:
  default:
    networks:
      - ai-tools

  proxy:
    networks:
      - ai-tools
      - proxy

  traefik:
    networks:
      - ai-tools
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.open-webui.rule: "Host(`${TRAEFIK_HOST}`)"
      traefik.http.routers.open-webui.entrypoints: "${TRAEFIK_ENTRYPOINTS:-websecure}"
      traefik.http.routers.open-webui.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      traefik.http.routers.open-webui.service: open-webui
      traefik.http.services.open-webui.loadbalancer.server.port: "${TRAEFIK_SERVICE_PORT:-8080}"

  traefik_proxy:
    networks:
      - ai-tools
      - proxy
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.open-webui.rule: "Host(`${TRAEFIK_HOST}`)"
      traefik.http.routers.open-webui.entrypoints: "${TRAEFIK_ENTRYPOINTS:-websecure}"
      traefik.http.routers.open-webui.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      traefik.http.routers.open-webui.service: open-webui
      traefik.http.services.open-webui.loadbalancer.server.port: "${TRAEFIK_SERVICE_PORT:-8080}"

networks:
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"
