services:
  webui:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    image: 'ghcr.io/open-webui/open-webui:${UI_IMAGE_TAG:-main}'
    container_name: open-webui
    volumes:
      - '${HOST_UI_DATA_DIR:-./data/open-webui}:/app/backend/data'
    ports:
      - '${HTTP_UI_BIND_ADDR:-127.0.0.1}:${HTTP_UI_BIND_PORT:-8010}:8080'
    env_file: .env
    environment:
      - 'OLLAMA_API_BASE_URL=${OLLAMA_API_BASE_URL:-http://ollama:11434/api}'
      - 'OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}'
      - 'WEBUI_SECRET_KEY=${UI_SECRET_KEY:-changeme}'
      # STT (Whisper):
      # https://docs.openwebui.com/reference/env-configuration/#speech-to-text-openai
      - 'AUDIO_STT_ENGINE=${AUDIO_STT_ENGINE:-}'
      - 'AUDIO_STT_OPENAI_API_BASE_URL=${AUDIO_STT_OPENAI_API_BASE_URL:-}'
      - 'AUDIO_STT_MODEL=${AUDIO_STT_MODEL:-}'
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: '${LOG_MAX_SIZE:-5m}'
        max-file: '${LOG_MAX_FILE:-5}'

networks:
  ai-tools:
    external: true
  proxy:
    external: true
    name: "${PROXY_NETWORK:-proxy}"
