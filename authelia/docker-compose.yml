# Authelia - SSO and forward-auth provider
# https://www.authelia.com/integration/deployment/docker/

services:
  authelia:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-traefik}"
    image: "authelia/authelia:${IMAGE_TAG:-4}"
    container_name: authelia
    hostname: authelia
    command: ["authelia"]
    ports:
      - "${HTTP_BIND_ADDR:-127.0.0.1}:${HTTP_BIND_PORT:-9091}:9091/tcp"
    env_file: .env
    environment:
      X_AUTHELIA_CONFIG: /config/configuration.yml
      X_AUTHELIA_CONFIG_FILTERS: template
      AUTHELIA_SESSION_SECRET_FILE: /secrets/session_secret
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: /secrets/storage_encryption_key
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE: /secrets/jwt_secret
    volumes:
      - "${CONFIG_PATH:-./config}:/config"
      - "${DATA_PATH:-./data}:/data"
      - "${SECRETS_PATH:-./secrets}:/secrets:ro"
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

networks:
  databases:
    external: true
    name: "${DATABASES_NETWORK:-databases}"
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"
