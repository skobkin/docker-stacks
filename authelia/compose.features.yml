services:
  default: {}

  databases:
    networks:
      - default
      - databases

  traefik:
    networks:
      - default
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.authelia.rule: "Host(`${TRAEFIK_HOST}`)"
      traefik.http.routers.authelia.entrypoints: "${TRAEFIK_ENTRYPOINTS:-websecure}"
      traefik.http.routers.authelia.service: authelia
      traefik.http.services.authelia.loadbalancer.server.port: "${TRAEFIK_SERVICE_PORT:-9091}"

  traefik_databases:
    networks:
      - default
      - traefik
      - databases
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.authelia.rule: "Host(`${TRAEFIK_HOST}`)"
      traefik.http.routers.authelia.entrypoints: "${TRAEFIK_ENTRYPOINTS:-websecure}"
      traefik.http.routers.authelia.service: authelia
      traefik.http.services.authelia.loadbalancer.server.port: "${TRAEFIK_SERVICE_PORT:-9091}"

networks:
  databases:
    external: true
    name: "${DATABASES_NETWORK:-databases}"
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"
