services:
  traefik:
    image: "${IMAGE_REPOSITORY:-traefik}:${IMAGE_TAG:-v3.6.7}"
    container_name: traefik
    depends_on:
      socket-proxy:
        condition: service_started
    ports:
      - "${HTTP_BIND_ADDR:-0.0.0.0}:${HTTP_BIND_PORT:-80}:80/tcp"
      - "${HTTPS_BIND_ADDR:-0.0.0.0}:${HTTPS_BIND_PORT:-443}:443/tcp"
    volumes:
      - "${CONFIG_PATH:-./config}:/etc/traefik:ro"
      - "${DATA_PATH:-./data}:/var/lib/traefik"
      - "${SECRETS_PATH:-./secrets}:/run/secrets/traefik:ro"
    env_file: "${ENV_FILE:-.env}"
    environment:
      TRAEFIK_PROVIDERS_DOCKER_NETWORK: "${TRAEFIK_NETWORK:-traefik}"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.dashboard.rule: >-
        Host(`${TRAEFIK_DASHBOARD_HOST:-traefik.example.com}`) &&
        (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
      traefik.http.routers.dashboard.entrypoints: "websecure"
      traefik.http.routers.dashboard.tls: "true"
      traefik.http.routers.dashboard.service: "api@internal"
      traefik.http.routers.dashboard.middlewares: "dashboard-chain@file"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"
    networks:
      - default
      - traefik

  socket-proxy:
    image: "${SOCKET_PROXY_IMAGE_REPOSITORY:-ghcr.io/tecnativa/docker-socket-proxy}:${SOCKET_PROXY_IMAGE_TAG:-v0.4.1}"
    container_name: traefik-socket-proxy
    volumes:
      - "${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro"
    environment:
      CONTAINERS: "1"
      EVENTS: "1"
      INFO: "1"
      NETWORKS: "1"
      POST: "0"
      LOG_LEVEL: "${SOCKET_PROXY_LOG_LEVEL:-warning}"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

networks:
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"
