services:
  continuwuity:
    image: "${IMAGE_REPOSITORY:-forgejo.ellis.link/continuwuation/continuwuity}:${IMAGE_TAG:-latest-maxperf}"
    container_name: continuwuity
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    command: /sbin/conduwuit
    ports:
      - "${HTTP_BIND_ADDR:-127.0.0.1}:${HTTP_BIND_PORT:-6167}:${CONTINUWUITY_PORT:-6167}/tcp"
    volumes:
      - "${DATA_PATH:-./data}:${CONTINUWUITY_DATABASE_PATH:-/var/lib/continuwuity}"
      - "${CONFIG_PATH:-./config}:/etc/continuwuity:ro"
      - "${BACKUPS_PATH:-./backups}:/var/lib/continuwuity-backups"
    env_file: "${ENV_FILE:-.env}"
    environment:
      CONTINUWUITY_DATABASE_PATH: "${CONTINUWUITY_DATABASE_PATH:-/var/lib/continuwuity}"
      CONTINUWUITY_ADDRESS: "${CONTINUWUITY_ADDRESS:-0.0.0.0}"
      CONTINUWUITY_PORT: "${CONTINUWUITY_PORT:-6167}"
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 1048567
        hard: 1048567
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

networks:
  proxy:
    external: true
    name: "${TRAEFIK_NETWORK:-proxy}"
