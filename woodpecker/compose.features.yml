services:
  default: {}

  traefik:
    networks:
      - forge
      - traefik
    labels:
      traefik.enable: 'true'
      traefik.docker.network: '${TRAEFIK_NETWORK:-traefik}'
      traefik.http.routers.woodpecker.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.woodpecker.entrypoints: '${TRAEFIK_ENTRYPOINT:-websecure}'
      traefik.http.routers.woodpecker.middlewares: 'chain-default@file'
      traefik.http.routers.woodpecker.service: 'woodpecker'
      traefik.http.services.woodpecker.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-8000}'
      traefik.http.routers.woodpecker-grpc.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.woodpecker-grpc.entrypoints: '${TRAEFIK_GRPC_ENTRYPOINT:-grpcsecure}'
      traefik.http.routers.woodpecker-grpc.service: 'woodpecker-grpc'
      traefik.http.services.woodpecker-grpc.loadbalancer.server.port: '${TRAEFIK_GRPC_SERVICE_PORT:-9000}'
      traefik.http.services.woodpecker-grpc.loadbalancer.server.scheme: 'h2c'
