# Fluent Bit pipeline: tails Docker json-file logs, renames Compose
# labels into top-level fields, and ships to VictoriaLogs over HTTP.
#
# See https://docs.victoriametrics.com/victorialogs/data-ingestion/Fluentbit/
# for the recommended VictoriaLogs ingestion format.

[SERVICE]
    Flush        5
    Daemon       off
    Log_Level    info
    Parsers_File parsers.conf

# Read each container's stdout/stderr JSON log as Docker writes it.
[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Refresh_Interval  5
    DB                /fluent-bit/state/tail.db

# Promote the Compose labels and stream field to top-level so VictoriaLogs
# can use them as _stream_fields. Rename, then drop the dotted originals.
[FILTER]
    Name             modify
    Match            docker.*
    Rename           compose_service  com_docker_compose_service
    Rename           compose_project  com_docker_compose_project
    Rename           stream          stream
    Hard_rename      com_docker_compose_service  compose_service
    Hard_rename      com_docker_compose_project  compose_project

# Ship to VictoriaLogs. The URI carries the field mapping expected by
# VictoriaLogs: logs are streamed as JSON lines, _msg_field and
# _time_field tell VictoriaLogs where to find the message and timestamp,
# and _stream_fields becomes the per-stream grouping key.
[OUTPUT]
    Name              http
    Match             *
    Host              ${VL_ADDRESS}
    Port              ${VL_PORT}
    URI               /insert/jsonline?_stream_fields=compose_service,compose_project,stream&_msg_field=log&_time_field=time
    Format            json_lines
    Json_date_key     time
    Json_date_format  iso8601
    Retry_Limit       5