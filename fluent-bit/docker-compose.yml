# Fluent Bit - log collector that tails Docker's json-file logs and ships
# them to VictoriaLogs over HTTP.
# https://docs.fluentbit.io/

services:
  fluent-bit:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    image: "${FB_IMAGE_REPOSITORY:-fluent/fluent-bit}:${FB_IMAGE_TAG:-5.0.7}"
    container_name: fluent-bit
    # Root is required to read /var/lib/docker/containers, which is owned
    # by root on most hosts. The directory is mounted read-only.
    user: "${FLUENT_BIT_UID:-0}"
    volumes:
      - "${DOCKER_CONTAINERS_PATH:-/var/lib/docker/containers}:/var/lib/docker/containers:ro"
      - "./config/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro"
      - "./config/parsers.conf:/fluent-bit/etc/parsers.conf:ro"
      - "${FB_STATE_PATH:-./data}:/fluent-bit/state"
    environment:
      VL_ADDRESS: "${VL_ADDRESS:-victoria-logs}"
      VL_PORT: "${VL_PORT:-9428}"
    env_file: .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

networks:
  logging:
    external: true
    name: "${LOGGING_NETWORK:-logging}"