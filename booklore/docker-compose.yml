services:
  booklore:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    image: 'ghcr.io/booklore-app/booklore:${IMAGE_TAG:-latest}'
    container_name: booklore
    hostname: booklore
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - 'USER_ID=${APP_USER_ID}'
      - 'GROUP_ID=${APP_GROUP_ID}'
      - 'TZ=${TZ}'
      - 'DATABASE_URL=jdbc:mariadb://${DATABASE_HOST:-host.docker.internal}:${DATABASE_PORT:-3306}/${DB_NAME}'
      - 'DATABASE_USERNAME=${DB_USER}'
      - 'DATABASE_PASSWORD=${DB_PASSWORD}'
      - 'DISK_TYPE=${DISK_TYPE}'
    ports:
      - '${WEBUI_BIND_ADDR:-127.0.0.1}:${WEBUI_BIND_PORT:-6060}:6060/tcp'
    volumes:
      - '${HOST_DATA_DIR:-./data}:/app/data'
      - '${HOST_BOOKS_DIR:-./books}:/books'
      - '${HOST_BOOKDROP_DIR:-./bookdrop}:/bookdrop'
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '${LOG_MAX_SIZE:-5m}'
        max-file: '${LOG_MAX_FILE:-5}'
    networks:
      - default
      - databases

networks:
  databases:
    external: true
    name: '${DATABASES_NETWORK:-databases}'
  traefik:
    external: true
    name: '${TRAEFIK_NETWORK:-traefik}'
