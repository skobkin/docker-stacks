services:
  default: {}

  traefik:
    labels:
      traefik.enable: 'true'
      traefik.http.routers.homeassistant.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.homeassistant.entrypoints: '${TRAEFIK_ENTRYPOINTS:-websecure}'
      traefik.http.routers.homeassistant.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      traefik.http.services.homeassistant.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-8123}'
