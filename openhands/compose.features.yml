services:
  default: {}

  traefik:
    networks:
      - traefik
    labels:
      traefik.enable: 'true'
      traefik.http.routers.openhands.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.openhands.entrypoints: '${TRAEFIK_ENTRYPOINTS:-websecure}'
      traefik.http.routers.openhands.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      traefik.http.services.openhands.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-3000}'
