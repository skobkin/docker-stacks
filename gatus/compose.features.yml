services:
  default: {}

  traefik:
    labels:
      traefik.enable: 'true'
      traefik.http.routers.gatus.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.gatus.entrypoints: '${TRAEFIK_ENTRYPOINT:-websecure}'
      traefik.http.routers.gatus.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      traefik.http.services.gatus.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-8080}'
