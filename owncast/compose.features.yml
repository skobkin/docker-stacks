services:
  default: {}

  traefik:
    networks:
      - default
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.owncast.rule: "Host(`${TRAEFIK_HOST}`)"
      traefik.http.routers.owncast.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.services.owncast.loadbalancer.server.port: "${TRAEFIK_SERVICE_PORT:-8080}"
