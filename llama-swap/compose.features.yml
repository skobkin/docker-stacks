services:
  default: {}

  traefik:
    networks:
      - traefik
    labels:
      traefik.enable: 'true'
      traefik.http.routers.llama-swap.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.llama-swap.entrypoints: '${TRAEFIK_ENTRYPOINT:-websecure}'
      traefik.http.services.llama-swap.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-8080}'
