services:
  default: {}
  default_echo: {}

  traefik:
    networks:
      - default
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.webhooksite.rule: "Host(`${TRAEFIK_HOST}`)"
      traefik.http.routers.webhooksite.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.webhooksite.service: "webhooksite"
      traefik.http.services.webhooksite.loadbalancer.server.port: "${TRAEFIK_SERVICE_PORT:-80}"
      traefik.http.services.webhooksite.loadbalancer.serverstransport: "long-lived@file"

  traefik_echo:
    networks:
      - default
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.webhooksite-socket.rule: "Host(`${TRAEFIK_HOST}`) && PathPrefix(`/socket.io`)"
      traefik.http.routers.webhooksite-socket.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.webhooksite-socket.priority: "100"
      traefik.http.routers.webhooksite-socket.service: "webhooksite-socket"
      traefik.http.services.webhooksite-socket.loadbalancer.server.port: "${TRAEFIK_SOCKET_SERVICE_PORT:-6001}"
      traefik.http.services.webhooksite-socket.loadbalancer.serverstransport: "long-lived@file"
