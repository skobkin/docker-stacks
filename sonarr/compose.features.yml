services:
  default: {}

  traefik:
    networks:
      - default
      - traefik
    labels:
      traefik.enable: 'true'
      traefik.http.routers.sonarr.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.sonarr.entrypoints: '${TRAEFIK_ENTRYPOINT:-websecure}'
      traefik.http.services.sonarr.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-8989}'
