
services:
  speedtest:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    # https://github.com/librespeed/speedtest-rust
    image: ghcr.io/librespeed/speedtest-rust:${IMAGE_TAG:-latest}
    container_name: speedtest
    ports:
      - "${HTTP_BIND_ADDR:-127.0.0.1}:${HTTP_BIND_PORT:-8888}:8080/tcp"
    volumes:
      - "${HOST_CONFIG_FILE:-./config/configs.toml}:/usr/local/bin/configs.toml:ro"
      - "${HOST_DATA_DIR:-./data}:/usr/local/bin/data"
    env_file: .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

networks:
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"
