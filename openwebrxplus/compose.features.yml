services:
  default: {}

  traefik:
    networks:
      - default
      - traefik
    labels:
      traefik.enable: 'true'
      traefik.docker.network: '${TRAEFIK_NETWORK:-traefik}'
      traefik.http.routers.openwebrxplus.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.openwebrxplus.entrypoints: '${TRAEFIK_ENTRYPOINT:-websecure}'
      traefik.http.routers.openwebrxplus.middlewares: '${TRAEFIK_ACCESS_POLICY:-default-access@file}'
      traefik.http.routers.openwebrxplus.service: openwebrxplus
      traefik.http.services.openwebrxplus.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-8073}'
