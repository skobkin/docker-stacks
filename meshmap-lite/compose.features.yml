services:
  default: {}

  traefik:
    networks:
      - default
      - traefik
    labels:
      traefik.enable: 'true'
      traefik.docker.network: '${TRAEFIK_NETWORK:-traefik}'
      traefik.http.routers.meshmap-lite.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.meshmap-lite.entrypoints: '${TRAEFIK_ENTRYPOINT:-websecure}'
      traefik.http.services.meshmap-lite.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-8080}'
