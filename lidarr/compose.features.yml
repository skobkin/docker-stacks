services:
  default: {}

  traefik:
    networks:
      - traefik
    labels:
      traefik.enable: 'true'
      traefik.http.routers.lidarr.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.lidarr.entrypoints: '${TRAEFIK_ENTRYPOINTS:-websecure}'
      traefik.http.services.lidarr.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-8686}'
