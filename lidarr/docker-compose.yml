
services:
  lidarr:
    extends:
      file: ./compose.features.yml
      service: "${COMPOSE_VARIANT:-default}"
    # https://hub.docker.com/r/linuxserver/lidarr
    image: linuxserver/lidarr:latest
    container_name: lidarr
    #network_mode: "host"
    ports:
      - "${HTTP_BIND_ADDR:-127.0.0.1}:${HTTP_BIND_PORT:-8686}:8686/tcp"
    env_file: .env
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${MUSIC_PATH}:/music"
      - "${DOWNLOADS_PATH}:/downloads"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILE:-5}"

networks:
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"
