services:
  default: {}

  traefik:
    networks:
      - default
      - traefik
    labels:
      traefik.enable: 'true'
      traefik.http.routers.emby.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.emby.entrypoints: '${TRAEFIK_ENTRYPOINT:-websecure}'
      traefik.http.routers.emby.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      traefik.http.services.emby.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-8096}'

networks:
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"
