services:
  default: {}

  traefik:
    networks:
      - traefik
    labels:
      traefik.enable: 'true'
      traefik.http.routers.portainer.rule: 'Host(`${TRAEFIK_HOST}`)'
      traefik.http.routers.portainer.entrypoints: '${TRAEFIK_ENTRYPOINTS:-websecure}'
      traefik.http.routers.portainer.middlewares: "${TRAEFIK_ACCESS_POLICY:-default-access@file}"
      traefik.http.services.portainer.loadbalancer.server.port: '${TRAEFIK_SERVICE_PORT:-9000}'
